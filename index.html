        * {

        }
        
        :root {
            --primary-color: #0c2461;

            --text-color: #333;
            --light-bg: #f8f9fa;
            --whatsapp-color: #25D366;

        /* --- NAVBAR --- */
        header {

            top: 0;

            gap: 10px;
        }

        .logo i {
            color: var(--secondary-color);
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 20px;

        }

        /* Normal Link Style for Admission */
        .nav-links a.normal-link {
            text-decoration: none;
            color: var(--primary-color);

            transition: 0.3s;

        .nav-links a.normal-link:hover {

        /* Button Style for About & Contact */
        .nav-btn {
            text-decoration: none;

            transition: all 0.3s ease;
            font-size: 14px;
            display: inline-block;
        }

        .btn-nav-outline {
            border: 2px solid var(--primary-color);
            color: var(--primary-color);
        }

        .btn-nav-outline:hover {
            background-color: var(--primary-color);
            color: #fff;
        }

        .btn-nav-filled {
            background-color: var(--primary-color);
            color: #fff;
            border: 2px solid var(--primary-color);
        }

            background-color: #1e3799;
